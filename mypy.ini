# EX-1 Hearth type gate.
#
# A strict-as-they-take mypy gate over the frozen trusted-core files ONLY. The
# rest of the repository is deliberately NOT type-checked here (no yak-shaving):
# this config lists exactly the Hearth files below and CI runs `python -m mypy`
# against it. The build fails if any of them stops type-checking.
#
# Why this gate exists: EX-1 makes "could not execute" a distinct type
# (core.models.Unavailable) that carries no `verdict`, so an authoritative
# verifier that could not run can never be narrowed into a verdict. That
# guarantee is only real if a checker enforces it — a `x.verdict` on an
# `Evidence | Unavailable` is a mypy error ([union-attr]) until the Unavailable
# branch is handled. A type contract that never runs is exactly the class of bug
# this sprint fixes, so the contract runs in CI.
#
# `mypy_path = src` + `explicit_package_bases` make the real prometheus types
# resolve (without them, ignore_missing_imports degrades them to Any and the
# gate is toothless — a mistake we caught and closed). `ignore_missing_imports`
# then covers only genuine third-party packages.
#
# Pre-existing baseline: four `[arg-type]` findings in verifier/bank.py from
# Evidence.verdict being typed `Verdict | None` (an intentional pre-1.0
# imprecision) are ratcheted with targeted inline `# type: ignore[arg-type]`
# markers — NOT fixed here (out of EX-1 scope). `warn_unused_ignores` flags any
# of them the moment the root type is tightened, so the ratchet only loosens
# deliberately. No new error may pass.

[mypy]
mypy_path = src
explicit_package_bases = True
ignore_missing_imports = True
warn_unused_ignores = True
files =
    src/prometheus_protocol/core/models.py,
    src/prometheus_protocol/core/interfaces.py,
    src/prometheus_protocol/verifier/runner.py,
    src/prometheus_protocol/verifier/sql.py,
    src/prometheus_protocol/verifier/bank.py,
    src/prometheus_protocol/gate/authorization.py,
    src/prometheus_protocol/benchmarks/judge_eval.py,
    src/prometheus_protocol/orchestration/runtime.py,
    src/prometheus_protocol/execution/controller.py,
    src/prometheus_protocol/execution/pending.py
