# Netlify deploy configuration for the validation landing page in site/.
# Static publish only: no build step, no functions, no plugins, no JS on the
# page. Form capture uses the platform's built-in form handling (the form in
# site/index.html carries the data-netlify attribute), so there is no backend
# to run or secure. Custom domain and HTTPS are configured in the Netlify UI.

[build]
  publish = "site"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"

# The form-success page has ONE canonical URL: /thanks. The extensionless
# path resolves whether or not the platform's Pretty URLs optimization is
# enabled, so the form's action never depends on an optimization toggle.
# The first rule needs force=true because /thanks.html exists as a real
# file and shadowed rules don't fire; the second makes /thanks serve the
# file deterministically instead of relying on implicit resolution.
[[redirects]]
  from = "/thanks.html"
  to = "/thanks"
  status = 301
  force = true

[[redirects]]
  from = "/thanks"
  to = "/thanks.html"
  status = 200
