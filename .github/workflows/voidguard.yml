name: voidguard

# Dogfood: scan this repository — the scanner's origin — with the extracted
# voidguard, report-only. The scanner's own fixture suite and gated self-scan
# live in its own repository's CI now (github.com/driivai/voidguard).
#
# NOTE: this job installs from driivai/voidguard and goes green once the
# extracted history is pushed there (the handoff branch voidguard-standalone-main).

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".github/workflows/voidguard.yml"
      - "tools/voidguard/**"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install voidguard (standalone repository)
        run: pip install "voidguard @ git+https://github.com/driivai/voidguard"

      - name: Scan (report-only)
        run: voidguard scan . --fail-on never --json voidguard-report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: voidguard-dogfood-report
          path: voidguard-report.json
