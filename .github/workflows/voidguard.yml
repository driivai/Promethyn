name: voidguard

# Dogfood: scan this repository — the scanner's origin — with the extracted
# voidguard, report-only. The scanner's own fixture suite and gated self-scan
# live in its own repository's CI now (github.com/driivai/voidguard).
#
# The install is PINNED to the exact reviewed extraction commit — the same
# posture this repo demands of container images (a floating ref can be
# repointed after review; a pinned one cannot). A green install is therefore
# also the byte-for-byte proof that the standalone repo carries the approved
# history. Bump the pin deliberately when the standalone repo advances.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".github/workflows/voidguard.yml"
      - "tools/voidguard/**"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install voidguard (standalone repository, pinned to the reviewed commit)
        run: pip install "voidguard @ git+https://github.com/driivai/voidguard@d371f9cd18eb880b3e49336134c476136ee515d2"

      - name: Scan (report-only)
        run: voidguard scan . --fail-on never --json voidguard-report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: voidguard-dogfood-report
          path: voidguard-report.json
