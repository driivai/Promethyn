name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so origin/main is resolvable. Several conformance
          # tests assert the Hearth (and default-judge path) are byte-identical to
          # main by diffing against origin/main; under the default shallow checkout
          # (fetch-depth 1) origin/main is absent and those tests SILENTLY SKIP —
          # the "Hearth unchanged" guard then never runs in CI. fetch-depth: 0
          # makes them run.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable + dev extra)
        run: python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall -q src tests scripts

      - name: Repository hygiene
        run: python scripts/check_hygiene.py

      - name: Enable unprivileged user namespaces (for the namespace sandbox)
        # Ubuntu 24.04 runners restrict unprivileged user namespaces via
        # AppArmor; lift it so the daemonless namespace adapter can isolate.
        # Tolerant of kernels/images without these knobs.
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 || true

      - name: Sandbox conformance (isolation must run, not skip)
        env:
          PROM_REQUIRE_SANDBOX: "1"
        run: python -m pytest -q tests/conformance -k sandbox

      - name: Hearth guards must EXECUTE, not skip (fetch-depth 0 makes origin/main resolvable)
        # The four Hearth/default-judge byte-identical tests skipif origin/main is
        # unresolvable — TRUE under the old shallow checkout, so they silently
        # skipped in CI. -v -rs makes their execution visible by name and shows the
        # SKIPPED list (they must not appear in it).
        run: python -m pytest -v -rs -k hearth tests/conformance

      - name: Test
        env:
          # Fail rather than skip the sandbox conformance tests if the isolation
          # runtime is missing, so green here always means isolation was proven.
          PROM_REQUIRE_SANDBOX: "1"
        run: python -m pytest -q

      - name: Build
        run: python -m build
